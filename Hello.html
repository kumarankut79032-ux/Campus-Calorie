<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Entering Food items, Date and Time </title>
    <link rel="stylesheet" href="Hello.css">
</head>
<body>
       <header>
        <div class="group1"><h1 id="id1"> Calculate Calories </h1>
        </div>
        </header>
        <main>
            <br>
            <br>
            <div class="container">
                <div class="box">
            <p > Date </p>
            <input type="date" id = "date" placeholder="12/04/2026">
            <button id="clickdate">click</button>
            </div>
            <div class="box">
            <p > Food consumed </p>
            <input type="text" id = "food-item" placeholder="E.g. Roti">
            <button id="clickfood">click</button>
            </div>
            </div>
            
            <div class="container">
            <div class="box">
            <p id="food-list" >Food List </p>
            </div>
            <div class="box">
            <div id="Daily-History"><p>Daily History</p></div>
            </div>
            </div>
        </main>
            <div class="group3">
            <b><button id="reset">Reset</button></b>
            <p id="localStorage"> localStorage</p>
            </div>
        
        <footer>
            <h2><p> Your total Calories intake is </p></h2>
            <input type="box"  id="totalcalories" placeholder=" your cal = 0 ">
        </footer>
          
        <p id="suggestion"> Suggestions for maintaining Calories. </p>
    <div class="group2"> <h id="id6"><br>| Thank You❤️❤️❤️ | Stay Fit and Healthy | </h>
        <br>
        <br>
    </div>
    
    <script src="java.js"></script>

</body>
</html>
